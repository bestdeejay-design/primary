  <!-- Landing Page -->
  <div id="landing" class="page">
    <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему">
      <svg class="icon"><use href="#icon-sun"/></svg>
    </button>
    
    <div class="hero">
      <div class="logo">
        <svg class="icon-xl"><use href="#icon-car"/></svg>
      </div>
      <h1>PRIMARY</h1>
      <p class="tagline">Премиальный сервис такси</p>
      <p class="desc">Элитные автомобили, профессиональные водители и безупречный сервис для ваших поездок по Москве</p>
      
      <div class="features">
        <div class="feature">
          <svg class="icon"><use href="#icon-diamond"/></svg>
          <span>Комфорт</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-shield"/></svg>
          <span>Безопасность</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-flash"/></svg>
          <span>Скорость</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-star"/></svg>
          <span>Премиум</span>
        </div>
      </div>
      
      <!-- Пассажир / Водитель Toggle -->
      <div class="mode-toggle-wrapper">
        <span id="passengerLabel" class="mode-label active">Пассажир</span>
        <div class="mode-toggle" onclick="toggleMode()">
          <div class="mode-toggle-knob" id="modeKnob"></div>
        </div>
        <span id="driverLabel" class="mode-label">Водитель</span>
      </div>
      
      <button class="btn-primary" onclick="openApp()">
        Начать поездку
        <svg class="icon"><use href="#icon-arrow"/></svg>
      </button>
      
      <p class="note">Premium service &bull; Москва &bull; 24/7</p>
    </div>
  </div>

  <!-- Mobile App -->
  <div id="app" class="page hidden">
    <div class="phone-frame">
      <div class="phone-header">
        <span class="status-bar"></span>
        <button class="theme-toggle-small" onclick="toggleTheme()">
          <svg class="icon-sm"><use href="#icon-sun"/></svg>
        </button>
      </div>
      
      <div class="app-header">
        <button class="back-btn hidden" onclick="goBack()" id="backBtn">
          <svg class="icon"><use href="#icon-arrow-left"/></svg>
        </button>
        <h2 id="appTitle">Главная</h2>
        <div class="header-actions">
          <div class="profile-icon" onclick="handleProfileClick()">
            <svg class="icon"><use href="#icon-user"/></svg>
          </div>
        </div>
      </div>
      
      <div class="app-content" id="content">
        <!-- Content injected by JS -->
      </div>
      
      <div class="bottom-nav" id="bottomNav">
        <!-- Injected by JS based on mode -->
      </div>
    </div>
    
    <button class="btn-exit" onclick="closeApp()">← На главную</button>
  </div>

  <script src="js/app.js"></script>
  <div style="position:fixed;top:12px;left:16px;z-index:99999;"><a href="https://axiiom.ru/demo/app/" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(10,10,15,.9);color:#C7C7CC;border:1px solid rgba(255,255,255,.08);border-radius:20px;text-decoration:none;font-family:Inter,sans-serif;font-size:13px;transition:all .2s;" onmouseover="this.style.background='rgba(10,10,15,1)';this.style.color='#F5F5F7';" onmouseout="this.style.background='rgba(10,10,15,.9)';this.style.color='#C7C7CC';">← Все демо AXIIOM</a></div>
